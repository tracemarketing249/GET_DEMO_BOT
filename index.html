    { icon:'💊', t:'Antibiotic use records', d:'Cannot prove antibiotic-free or responsible use claims' },
    { icon:'📑', t:'ASC/BAP audit', d:'Missing data for aquaculture certification audits' },
    { icon:'📦', t:'Batch to export', d:'No lot-level trace from harvest to processing to export' },
    { icon:'📊', t:'Feed conversion data', d:'No digital FCR records per pond or cycle' },
    { icon:'🌊', t:'Water quality logs', d:'Manual or missing water quality monitoring records' },
  ],
  sugarcane: [
    { icon:'🎋', t:'Farmer plot mapping', d:'No digital or geo-tagged records of cane fields' },
    { icon:'⚖️', t:'Cane weighment disputes', d:'Errors and disputes in manual weighbridge records' },
    { icon:'📅', t:'Harvest scheduling', d:'No system to plan and track harvesting per farmer' },
    { icon:'🌿', t:'Sustainability reporting', d:'Bonsucro certification trail not available' },
    { icon:'💧', t:'Irrigation records', d:'No data on water use per plot for sustainability audits' },
    { icon:'💰', t:'Farmer payment', d:'Delays and errors in FRP/SAP payment calculation' },
  ],
  cotton: [
    { icon:'🪻', t:'Farm-level records', d:'No digital farmer and plot profiles for cotton sourcing' },
    { icon:'📋', t:'BCI / GOTS compliance', d:'Missing audit trail for sustainable cotton certification' },
    { icon:'🧪', t:'Pesticide tracking', d:'No chemical use records for residue traceability' },
    { icon:'📦', t:'Ginning traceability', d:'Cannot trace lint bales back to originating farm' },
    { icon:'🌍', t:'Forced labour due diligence', d:'Cannot document supply chain for UYGHUR Act compliance' },
    { icon:'💳', t:'Input distribution', d:'No system to track seed, fertilizer or loan disbursement' },
  ],
  other: [
    { icon:'🗂️', t:'Farmer data management', d:'No structured digital farmer registration system' },
    { icon:'📍', t:'Field traceability', d:'Cannot map or geo-tag farmland and crop activities' },
    { icon:'📋', t:'Audit readiness', d:'Missing documentation for buyer or certification audits' },
    { icon:'🔗', t:'Supply chain visibility', d:'No digital trail from farm to processing to market' },
    { icon:'🌱', t:'Sustainability claims', d:'Cannot measure or report ESG or GHG data' },
    { icon:'📲', t:'Digital farmer engagement', d:'No mobile channel for advisory or data collection' },
  ],
};

const MODULES = [
  { id:'farmer', icon:'👩‍🌾', label:'Farmer Profiling' },
  { id:'field', icon:'🗺️', label:'Geo-tagged Fields' },
  { id:'crop', icon:'🌱', label:'Crop Activities' },
  { id:'collection', icon:'📦', label:'Collection Data' },
  { id:'sampling', icon:'🧪', label:'Sampling & QC' },
  { id:'erp', icon:'📊', label:'ERP / Finance' },
  { id:'ghg', icon:'🌍', label:'GHG & Emissions' },
  { id:'cert', icon:'📋', label:'Certifications' },
  { id:'audit', icon:'🔍', label:'Audit Trail' },
  { id:'qr', icon:'📲', label:'QR Traceability' },
  { id:'supply', icon:'🔗', label:'Supply Chain' },
  { id:'advisory', icon:'💬', label:'Farmer Advisory' },
];

const SCALES = [
  { id:'pilot', icon:'🌱', title:'Pilot', desc:'50–500 farmers, single region, quick start in 4 weeks' },
  { id:'regional', icon:'🌿', title:'Regional rollout', desc:'500–5,000 farmers, multi-district deployment in 3 months' },
  { id:'enterprise', icon:'🏭', title:'Enterprise', desc:'5,000+ farmers, multi-country, full integration with existing ERP' },
];

let state = {
  step: 0,
  industry: null,
  pains: [],
  modules: [],
  scale: null,
  contact: {},
  generatedDesc: '',
};

const STEPS = ['Industry','Pain Points','Modules','Scale','Your Details','Your Demo'];

function renderStepIndicator() {
  const el = document.getElementById('stepIndicator');
  el.innerHTML = STEPS.map((s, i) => {
    let cls = i < state.step ? 'done' : i === state.step ? 'active' : 'future';
    let inner = i < state.step ? '✓' : (i + 1);
    let line = i < STEPS.length - 1
      ? `<div class="step-line ${i < state.step ? 'done' : ''}"></div>`
      : '';
    return `<div class="step-dot ${cls}" title="${s}">${inner}</div>${line}`;
  }).join('');
}

function setBotMsg(html) {
  document.getElementById('botMsg').innerHTML = html;
}

function render() {
  renderStepIndicator();
  const body = document.getElementById('chatBody');
  body.innerHTML = '';

  const steps = [renderStep0, renderStep1, renderStep2, renderStep3, renderStep4, renderStep5];
  steps[state.step](body);
}

function nextBtn(label, onClick, extra='') {
  return `<button class="btn-next" onclick="${onClick}" id="nextBtn" ${extra}>
    ${label} <span>→</span>
  </button>`;
}

function backBtn() {
  return `<button class="btn-back" onclick="goBack()">← Back</button>`;
}

function goBack() {
  if (state.step > 0) { state.step--; render(); }
}

function renderStep0(body) {
  setBotMsg('First things first — which agricultural industry does your operation focus on? This helps me tailor everything for you.');
  body.innerHTML = `
    <p class="section-label">Select your industry</p>
    <div class="industry-grid" id="industryGrid">
      ${INDUSTRIES.map(ind => `
        <div class="industry-card ${state.industry === ind.id ? 'selected' : ''}" onclick="selectIndustry('${ind.id}')">
          <div class="industry-icon">${ind.icon}</div>
          <div class="industry-name">${ind.name}</div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:4px;text-align:right;">
      ${nextBtn('Next: Pain Points', 'stepNext()', state.industry ? '' : 'disabled')}
    </div>
  `;
}

function selectIndustry(id) {
  state.industry = id;
  state.pains = [];
  render();
}

function renderStep1(body) {
  const ind = INDUSTRIES.find(i => i.id === state.industry);
  const pains = PAIN_POINTS[state.industry] || PAIN_POINTS.other;
  setBotMsg(`Great choice! ${ind.icon} <strong>${ind.name}</strong> has some unique challenges. Which of these pain points resonate most with your operation? Select all that apply.`);
  body.innerHTML = `
    ${backBtn()}
    <p class="section-label">Select your pain points (choose at least 2)</p>
    <div class="pain-list">
      ${pains.map((p, i) => `
        <div class="pain-item ${state.pains.includes(i) ? 'selected' : ''}" onclick="togglePain(${i})">
          <div class="pain-check">${state.pains.includes(i) ? '✓' : ''}</div>
          <div style="font-size:20px;">${p.icon}</div>
          <div class="pain-text">${p.t}<small>${p.d}</small></div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:4px;text-align:right;">
      ${nextBtn('Next: Modules', 'stepNext()', state.pains.length >= 2 ? '' : 'disabled')}
    </div>
  `;
}

function togglePain(i) {
  const idx = state.pains.indexOf(i);
  if (idx > -1) state.pains.splice(idx, 1);
  else state.pains.push(i);
  render();
}

function renderStep2(body) {
  setBotMsg('Now let\'s design your traceability stack. Drag the modules you need into the box below — or click them to add. Build your ideal solution!');

  const dropped = new Set(state.modules);

  body.innerHTML = `
    ${backBtn()}
    <p class="section-label">Drag modules into your solution</p>
    <div class="drag-zone" id="dropZone" ondragover="event.preventDefault();this.classList.add('drag-over')" ondragleave="this.classList.remove('drag-over')" ondrop="handleDrop(event)">
      ${state.modules.length === 0 ? '<div class="drag-zone-placeholder">📥 Drop modules here to build your stack</div>' : ''}
      ${state.modules.map(id => {
        const m = MODULES.find(x => x.id === id);
        return `<div class="module-chip dropped" data-id="${id}">
          <span class="chip-icon">${m.icon}</span> ${m.label}
          <span class="chip-remove" onclick="removeModule('${id}')">×</span>
        </div>`;
      }).join('')}
    </div>
    <p class="section-label" style="margin-top:16px;">Available modules</p>
    <div class="module-shelf" id="shelf">
      ${MODULES.filter(m => !dropped.has(m.id)).map(m => `
        <div class="module-chip" draggable="true" data-id="${m.id}"
          ondragstart="handleDragStart(event)"
          ondragend="handleDragEnd(event)"
          onclick="addModule('${m.id}')">
          <span class="chip-icon">${m.icon}</span> ${m.label}
        </div>
      `).join('')}
    </div>
    <div style="margin-top:4px;text-align:right;">
      ${nextBtn('Next: Scale', 'stepNext()', state.modules.length >= 1 ? '' : 'disabled')}
    </div>
  `;
}

function handleDragStart(e) {
  e.dataTransfer.setData('text/plain', e.target.dataset.id);
  e.target.classList.add('dragging');
}

function handleDragEnd(e) {
  e.target.classList.remove('dragging');
}

function handleDrop(e) {
  e.preventDefault();
  document.getElementById('dropZone').classList.remove('drag-over');
  const id = e.dataTransfer.getData('text/plain');
  addModule(id);
}

function addModule(id) {
  if (!state.modules.includes(id)) { state.modules.push(id); render(); }
}

function removeModule(id) {
  state.modules = state.modules.filter(x => x !== id);
  render();
}

function renderStep3(body) {
  setBotMsg('Almost there! What is the scale of your operation? This helps us match the right implementation approach and deployment timeline for you.');
  body.innerHTML = `
    ${backBtn()}
    <p class="section-label">Select your operation scale</p>
    <div class="scale-row">
      ${SCALES.map(s => `
        <div class="scale-opt ${state.scale === s.id ? 'selected' : ''}" onclick="selectScale('${s.id}')">
          <div class="scale-radio"></div>
          <div style="font-size:22px;">${s.icon}</div>
          <div class="scale-info">
            <div class="scale-title">${s.title}</div>
            <div class="scale-desc">${s.desc}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="margin-top:4px;text-align:right;">
      ${nextBtn('Next: Your Details', 'stepNext()', state.scale ? '' : 'disabled')}
    </div>
  `;
}

function selectScale(id) {
  state.scale = id;
  render();
}

function renderStep4(body) {
  setBotMsg('Almost ready to generate your custom demo! Just a few quick details so we can personalise this for you and book your session.');
  body.innerHTML = `
    ${backBtn()}
    <p class="section-label">Your details</p>
    <div class="contact-grid">
      <div class="field-group">
        <label class="field-label">First name</label>
        <input class="field-input" type="text" id="fname" placeholder="Priya" value="${state.contact.fname||''}" oninput="updateContact()" />
      </div>
      <div class="field-group">
        <label class="field-label">Last name</label>
        <input class="field-input" type="text" id="lname" placeholder="Nair" value="${state.contact.lname||''}" oninput="updateContact()" />
      </div>
      <div class="field-group full">
        <label class="field-label">Work email</label>
        <input class="field-input" type="email" id="email" placeholder="priya@company.com" value="${state.contact.email||''}" oninput="updateContact()" />
      </div>
      <div class="field-group">
        <label class="field-label">Company / Organisation</label>
        <input class="field-input" type="text" id="company" placeholder="Green Estates Ltd" value="${state.contact.company||''}" oninput="updateContact()" />
      </div>
      <div class="field-group">
        <label class="field-label">Country</label>
        <select class="field-select" id="country" onchange="updateContact()">
          <option value="">Select country</option>
          ${['India','Sri Lanka','Kenya','Ethiopia','Vietnam','Indonesia','Ghana','Tanzania','Colombia','Brazil','Other'].map(c=>`<option ${state.contact.country===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
      <div class="field-group full">
        <label class="field-label">Your role</label>
        <select class="field-select" id="role" onchange="updateContact()">
          <option value="">Select your role</option>
          ${['CEO / Founder','Operations Manager','Sustainability Manager','Supply Chain Manager','IT / Technology Head','Procurement Manager','Quality Manager','Other'].map(r=>`<option ${state.contact.role===r?'selected':''}>${r}</option>`).join('')}
        </select>
      </div>
    </div>
    <div style="text-align:right;">
      ${nextBtn('Generate My Demo →', 'generateDemo()', isContactValid() ? '' : 'disabled')}
    </div>
  `;
}

function updateContact() {
  state.contact = {
    fname: document.getElementById('fname')?.value || '',
    lname: document.getElementById('lname')?.value || '',
    email: document.getElementById('email')?.value || '',
    company: document.getElementById('company')?.value || '',
    country: document.getElementById('country')?.value || '',
    role: document.getElementById('role')?.value || '',
  };
  const btn = document.getElementById('nextBtn');
  if (btn) btn.disabled = !isContactValid();
}

function isContactValid() {
  const c = state.contact;
  return c.fname && c.lname && c.email && c.email.includes('@') && c.company && c.country && c.role;
}

async function generateDemo() {
  if (!isContactValid()) return;
  state.step = 5;
  renderStepIndicator();

  const ind = INDUSTRIES.find(i => i.id === state.industry);
  const pains = PAIN_POINTS[state.industry] || PAIN_POINTS.other;
  const selectedPains = state.pains.map(i => pains[i]?.t).filter(Boolean);
  const selectedModules = state.modules.map(id => MODULES.find(m => m.id === id)?.label).filter(Boolean);
  const scale = SCALES.find(s => s.id === state.scale);

  const body = document.getElementById('chatBody');
  setBotMsg(`Generating your personalised demo profile, ${state.contact.fname}... 🐝`);
  body.innerHTML = `
    <div class="generating-state">
      <div class="dots"><span></span><span></span><span></span></div>
      <span style="font-size:13px;color:var(--text-secondary);">Building your custom demo summary...</span>
    </div>
  `;

  const prompt = `You are Tracer, the AI assistant for Trace AgTech — a farm traceability software platform.

A potential client has just completed the demo configurator. Write a 3-sentence personalised demo description for them. Be warm, specific, and professional. Mention their industry, 2 of their pain points, and 2 of their chosen modules. End with a strong call-to-action.

Client Details:
- Name: ${state.contact.fname} ${state.contact.lname}
- Company: ${state.contact.company}
- Industry: ${ind?.name}
- Pain Points: ${selectedPains.join(', ')}
- Modules chosen: ${selectedModules.join(', ')}
- Scale: ${scale?.title}
- Country: ${state.contact.country}
- Role: ${state.contact.role}

Write ONLY the 3-sentence description. No formatting, no headers, no intro. Plain text only.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }],
      }),
    });
    const data = await response.json();
    state.generatedDesc = data.content?.[0]?.text || 'Your personalised Trace AgTech demo is ready. Our team will walk you through a solution tailored to your operation.';
  } catch (e) {
    state.generatedDesc = `For ${state.contact.company}, we've designed a Trace AgTech demo that directly addresses your ${ind?.name.toLowerCase()} traceability needs — from eliminating audit gaps to building a verifiable supply chain. We'll showcase ${selectedModules.slice(0,2).join(' and ')} in action, configured for a ${scale?.title.toLowerCase()} deployment across your operation. Let's show you how leading agribusinesses are turning traceability into a competitive advantage — your demo awaits.`;
  }

  renderStep5(body);
}

function renderStep5(body) {
  const ind = INDUSTRIES.find(i => i.id === state.industry);
  const pains = PAIN_POINTS[state.industry] || PAIN_POINTS.other;
  const selectedPains = state.pains.map(i => pains[i]?.t).filter(Boolean);
  const selectedModules = state.modules.map(id => MODULES.find(m => m.id === id)?.label).filter(Boolean);
  const scale = SCALES.find(s => s.id === state.scale);

  setBotMsg(`🎉 Your personalised demo profile is ready, <span class="greeting-name">${state.contact.fname}</span>! Here's what we'll build for you.`);

  body.innerHTML = `
    <div class="success-header">
      <div class="success-icon">🐝</div>
      <div class="success-title">Your Demo is Configured</div>
      <div class="success-sub">${state.contact.company} · ${ind?.name} · ${scale?.title}</div>
    </div>

    <div class="divider"></div>

    <div class="desc-box">
      <div class="desc-box-title">✦ Your Personalised Summary</div>
      <div class="desc-text">${state.generatedDesc}</div>
      <div class="desc-tags">
        ${selectedModules.map(m => `<span class="desc-tag">${m}</span>`).join('')}
      </div>
    </div>

    <div class="divider"></div>

    <div class="h2" style="font-size:16px;margin-bottom:12px;">What happens next</div>
    <div class="timeline-item">
      <div class="timeline-icon" style="background:var(--amber-light);">📧</div>
      <div class="timeline-t">Confirmation email sent<small>Check ${state.contact.email} for your summary</small></div>
    </div>
    <div class="timeline-item">
      <div class="timeline-icon" style="background:var(--green-light);">📞</div>
      <div class="timeline-t">A Trace AgTech expert will call you within 24 hours<small>To confirm your demo slot and answer any questions</small></div>
    </div>
    <div class="timeline-item">
      <div class="timeline-icon" style="background:var(--amber-light);">🖥️</div>
      <div class="timeline-t">Live 45-minute demo session<small>Custom-configured for ${ind?.name} · ${scale?.title} scale</small></div>
    </div>

    <div class="divider"></div>

    <div class="badge-row" style="margin-bottom:20px;">
      <span class="badge">${ind?.icon} ${ind?.name}</span>
      <span class="badge">📏 ${scale?.title}</span>
      ${selectedPains.slice(0,2).map(p => `<span class="badge">⚡ ${p}</span>`).join('')}
    </div>

    <button class="btn-primary" onclick="finalSubmit()">
      🚀 Request My Demo Session
    </button>
    <div style="text-align:center;margin-top:12px;font-size:12px;color:var(--text-muted);">
      No credit card required · Free 45-minute session · Responds within 1 business day
    </div>
  `;
}

function finalSubmit() {
  const body = document.getElementById('chatBody');
  setBotMsg(`🎉 You're all set, ${state.contact.fname}! We'll be in touch shortly.`);
  body.innerHTML = `
    <div style="text-align:center;padding:32px 0;">
      <div style="font-size:56px;margin-bottom:16px;">🌾</div>
      <div class="success-title" style="font-size:22px;">Demo request submitted!</div>
      <p style="color:var(--text-muted);font-size:14px;margin-top:10px;line-height:1.6;">
        Thank you, ${state.contact.fname}. The Trace AgTech team will reach out<br>to <strong>${state.contact.email}</strong> within one business day.
      </p>
      <div style="margin-top:24px;padding:16px 20px;background:var(--green-light);border-radius:14px;border:1px solid rgba(45,90,63,0.15);text-align:left;">
        <div style="font-size:12px;font-weight:600;color:var(--green-deep);margin-bottom:8px;letter-spacing:0.5px;text-transform:uppercase;">While you wait</div>
        <div style="font-size:13px;color:var(--green-mid);line-height:1.7;">
          → Explore our <strong>case studies</strong> from similar operations<br>
          → Watch a <strong>3-minute product overview</strong> video<br>
          → Join our <strong>WhatsApp community</strong> for agri-traceability news
        </div>
      </div>
    </div>
  `;
}

function stepNext() {
  const canProceed = [
    () => !!state.industry,
    () => state.pains.length >= 2,
    () => state.modules.length >= 1,
    () => !!state.scale,
    () => isContactValid(),
  ];
  if (state.step < 4 && canProceed[state.step]()) {
    state.step++;
    render();
  } else if (state.step === 4) {
    generateDemo();
  }
}

render();
</script>
